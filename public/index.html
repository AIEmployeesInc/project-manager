<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand" aria-label="AI Employees inc.">
        <svg class="brand-mark" viewBox="0 0 42 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="aiGrad" x1="0" y1="0" x2="42" y2="0" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5FB4EC" />
              <stop offset="1" stop-color="#4A90D9" />
            </linearGradient>
          </defs>
          <path d="M6 25 L16 6 L26 25" stroke="url(#aiGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M33 6 L33 25" stroke="url(#aiGrad)" stroke-width="5" stroke-linecap="round" />
        </svg>
        <span class="brand-text">Employees</span>
        <span class="brand-inc">inc.</span>
      </div>
      <div class="sidebar-head">
        <h1>Projects</h1>
        <button id="newChannelBtn" class="btn-new" title="Create a channel">+ New Channel</button>
      </div>
      <nav id="channelList" class="channel-list"></nav>
      <div class="sidebar-foot">
        <span class="you-label">You are</span>
        <button id="nameBtn" class="name-btn"></button>
      </div>
    </aside>

    <!-- Main panel -->
    <main class="main">
      <!-- Empty state -->
      <section id="emptyState" class="empty-state">
        <div>
          <h2>👋 Welcome</h2>
          <p>Select a channel on the left, or create a new one to get started.</p>
          <button id="emptyOpenSidebar" class="empty-open-btn">☰ Browse channels</button>
        </div>
      </section>

      <!-- Channel view -->
      <section id="channelView" class="channel-view hidden">
        <header class="channel-head">
          <div class="head-left">
            <button id="toggleSidebarBtn" class="panel-toggle" title="Show/hide channels panel" aria-label="Toggle channels panel">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
            </button>
            <h2 id="channelName">#channel</h2>
            <button id="copyLinkBtn" class="link-btn" title="Copy channel link">🔗 Copy link</button>
          </div>
          <div class="head-right">
            <button id="toggleRailBtn" class="panel-toggle" title="Show/hide files &amp; to-do panel" aria-label="Toggle files and to-do panel">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
            </button>
            <button id="deleteChannelBtn" class="danger-btn" title="Delete channel">Delete</button>
          </div>
        </header>

        <div class="channel-body">
          <!-- Chat -->
          <div class="chat">
            <div id="messages" class="messages"></div>
            <form id="messageForm" class="message-form">
              <textarea id="messageInput" placeholder="Message this channel…" rows="1"></textarea>
              <button type="submit">Send</button>
            </form>
          </div>

          <!-- Right rail: tabbed Files / To-Do / Fixes -->
          <div class="rail">
            <div class="rail-tabs" role="tablist">
              <button class="rail-tab active" data-tab="files" role="tab">Files</button>
              <button class="rail-tab" data-tab="todo" role="tab">To-Do</button>
              <button class="rail-tab" data-tab="fixes" role="tab">Fixes</button>
            </div>

            <div class="rail-panel" data-panel="files">
              <label class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" hidden />
                <span>📎 Click or drop a file to upload</span>
              </label>
              <ul id="fileList" class="file-list"></ul>
            </div>

            <div class="rail-panel hidden" data-panel="todo">
              <form id="todoForm" class="todo-form">
                <input id="todoInput" type="text" placeholder="Add a task…" />
                <button type="submit">Add</button>
              </form>
              <ul id="todoList" class="todo-list"></ul>
            </div>

            <div class="rail-panel hidden" data-panel="fixes">
              <form id="fixForm" class="todo-form">
                <input id="fixInput" type="text" placeholder="Add a fix…" />
                <button type="submit">Add</button>
              </form>
              <ul id="fixList" class="todo-list"></ul>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Dimmed backdrop behind mobile drawers (tap to close) -->
    <div class="backdrop" id="backdrop"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
